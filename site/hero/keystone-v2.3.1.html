<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bazarr+ v2.3.1 Keystone Hero</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #09040b; overflow: hidden; }
  body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }
  canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }
</style>
</head>
<body>
<script>
// Bazarr+ v2.3.1 Keystone hero generator.
// Same Keystone-family composition as v2.3.0, with a cool-teal pivot accent
// on the left to hint at the auto-translate source-language flow that headlines
// v2.3.1, plus an updated version text and seed.
// Query params:
//   ?w=1024&h=1024   exact canvas size
//   ?seed=231        deterministic particle placement seed
//
// Drawn once, no animation. Use headless Chrome screenshots to capture.

const params = new URLSearchParams(location.search);
const W = parseInt(params.get('w') || '1920', 10);
const H = parseInt(params.get('h') || '1080', 10);
const SEED = parseInt(params.get('seed') || '231', 10);
const S = Math.min(W, H);

const NAVY = '#121125';
const INK = '#09040b';
const INK_WARM = '#18070a';
const STONE_DARK = '#171020';
const STONE = '#3a2730';
const STONE_LIT = '#6a3c28';
const AMBER = '#e68a00';
const AMBER_BRIGHT = '#ffb347';
const FIRE = '#ff5a00';
const CREAM = '#fff8e1';

const canvas = document.createElement('canvas');
canvas.width = W;
canvas.height = H;
document.body.appendChild(canvas);

const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'high';

let rng = mulberry32(SEED);

drawHero();

function drawHero() {
  drawBackground();
  drawStars();
  drawFoundationGlow();
  drawKeystoneGateway();
  drawText();
  drawFilmGrain();
}

function drawBackground() {
  ctx.fillStyle = INK;
  ctx.fillRect(0, 0, W, H);

  const base = ctx.createLinearGradient(0, 0, W, H);
  base.addColorStop(0, '#09030a');
  base.addColorStop(0.46, '#16060b');
  base.addColorStop(1, NAVY);
  ctx.fillStyle = base;
  ctx.fillRect(0, 0, W, H);

  fillRadial(W * 0.76, H * 0.54, S * 0.72, [
    ['rgba(230, 138, 0, 0.16)', 0],
    ['rgba(255, 90, 0, 0.07)', 0.42],
    ['rgba(255, 90, 0, 0)', 1],
  ]);

  fillRadial(W * 0.10, H * 0.18, S * 0.55, [
    ['rgba(255, 179, 71, 0.11)', 0],
    ['rgba(255, 179, 71, 0)', 1],
  ]);

  fillRadial(W * 0.16, H * 0.62, S * 0.48, [
    ['rgba(70, 170, 200, 0.10)', 0],
    ['rgba(70, 170, 200, 0.04)', 0.42],
    ['rgba(70, 170, 200, 0)', 1],
  ]);

  fillRadial(W * 0.84, H * 1.04, S * 0.66, [
    ['rgba(94, 42, 18, 0.34)', 0],
    ['rgba(94, 42, 18, 0)', 1],
  ]);
}

function drawStars() {
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (let i = 0; i < 300; i++) {
    const x = rand(0, W);
    const y = rand(0, H);
    const r = rng() < 0.92 ? rand(0.35, 1.05) : rand(1.2, 1.9);
    const a = rng() < 0.86 ? rand(0.10, 0.42) : rand(0.48, 0.78);
    ctx.fillStyle = `rgba(255, 248, 225, ${a})`;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawFoundationGlow() {
  const cx = W * 0.74;
  const cy = H * 0.58;

  ctx.save();
  ctx.globalCompositeOperation = 'screen';

  for (let i = 0; i < 120; i++) {
    const x = rand(W * 0.42, W * 1.02);
    const y = rand(H * 0.60, H * 1.04);
    const r = rand(S * 0.006, S * 0.038);
    const a = rand(0.018, 0.07);
    drawGlow(x, y, r, rng() < 0.72 ? AMBER : FIRE, a);
  }

  for (let i = 0; i < 24; i++) {
    const x0 = rand(W * 0.42, W * 0.98);
    const y0 = rand(H * 0.72, H * 0.98);
    const x1 = cx + rand(-S * 0.30, S * 0.26);
    const y1 = cy + rand(-S * 0.30, S * 0.04);
    const grad = ctx.createLinearGradient(x0, y0, x1, y1);
    grad.addColorStop(0, 'rgba(255, 90, 0, 0)');
    grad.addColorStop(0.48, `rgba(255, 179, 71, ${rand(0.035, 0.12)})`);
    grad.addColorStop(1, 'rgba(255, 90, 0, 0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = rand(S * 0.0010, S * 0.0028);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();
  }

  ctx.restore();
}

function drawKeystoneGateway() {
  const cx = W * 0.735;
  const cy = H * 0.59;
  const outerR = S * 0.355;
  const innerR = S * 0.235;

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  drawGlow(cx, cy - S * 0.10, S * 0.46, AMBER, 0.19);
  drawGlow(cx, cy + S * 0.22, S * 0.32, FIRE, 0.07);
  ctx.restore();

  drawBackPlate(cx, cy, innerR, outerR);
  drawArchBlocks(cx, cy, innerR, outerR);
  drawStoneConnectors(cx, cy, innerR, outerR);
  drawRosettaStone(cx, cy + S * 0.02, innerR);
  drawCenterKeystone(cx, cy, innerR);
}

function drawBackPlate(cx, cy, innerR, outerR) {
  const start = Math.PI * 1.02;
  const end = Math.PI * 1.98;
  const outer = outerR * 1.018;
  const inner = innerR * 0.982;
  const bottom = cy + outerR * 0.85;
  const outerStart = polar(cx, cy, outer, start);
  const outerEnd = polar(cx, cy, outer, end);
  const innerStart = polar(cx, cy, inner, start);
  const innerEnd = polar(cx, cy, inner, end);

  ctx.save();
  ctx.fillStyle = 'rgba(6, 3, 10, 0.70)';
  ctx.strokeStyle = 'rgba(255, 179, 71, 0.10)';
  ctx.lineWidth = S * 0.002;
  ctx.beginPath();
  ctx.arc(cx, cy, outer, start, end);
  ctx.lineTo(outerEnd.x, bottom);
  ctx.lineTo(innerEnd.x, bottom);
  ctx.lineTo(innerEnd.x, innerEnd.y);
  ctx.arc(cx, cy, inner, end, start, true);
  ctx.lineTo(innerStart.x, bottom);
  ctx.lineTo(outerStart.x, bottom);
  ctx.lineTo(outerStart.x, outerStart.y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.globalCompositeOperation = 'screen';
  ctx.strokeStyle = 'rgba(255, 179, 71, 0.065)';
  ctx.lineWidth = S * 0.003;
  ctx.beginPath();
  ctx.arc(cx, cy, inner, start, end);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255, 179, 71, 0.050)';
  ctx.lineWidth = S * 0.002;
  ctx.beginPath();
  ctx.moveTo(innerStart.x, innerStart.y);
  ctx.lineTo(innerStart.x, bottom);
  ctx.moveTo(innerEnd.x, innerEnd.y);
  ctx.lineTo(innerEnd.x, bottom);
  ctx.stroke();
  ctx.restore();
}

function drawArchBlocks(cx, cy, innerR, outerR) {
  const count = 15;
  const start = Math.PI * 1.02;
  const end = Math.PI * 1.98;
  const step = (end - start) / count;

  ctx.save();
  ctx.shadowColor = 'rgba(0, 0, 0, 0.65)';
  ctx.shadowBlur = S * 0.018;
  for (let i = 0; i < count; i++) {
    const a0 = start + i * step + 0.010;
    const a1 = start + (i + 1) * step - 0.010;
    const isKey = i === Math.floor(count / 2);
    drawArchBlock(cx, cy, innerR, outerR, a0, a1, isKey);
  }
  ctx.restore();
}

function drawArchBlock(cx, cy, innerR, outerR, a0, a1, isKey) {
  const p0 = polar(cx, cy, innerR, a0);
  const p1 = polar(cx, cy, outerR, a0);
  const p2 = polar(cx, cy, outerR, a1);
  const p3 = polar(cx, cy, innerR, a1);
  const mid = (a0 + a1) * 0.5;
  const lit = polar(cx, cy, outerR, mid);
  const shade = polar(cx, cy, innerR, mid);

  const grad = ctx.createLinearGradient(lit.x, lit.y, shade.x, shade.y);
  if (isKey) {
    grad.addColorStop(0, '#fff0b5');
    grad.addColorStop(0.35, AMBER_BRIGHT);
    grad.addColorStop(1, AMBER);
  } else {
    grad.addColorStop(0, STONE_LIT);
    grad.addColorStop(0.55, STONE);
    grad.addColorStop(1, STONE_DARK);
  }

  ctx.save();
  ctx.fillStyle = grad;
  ctx.strokeStyle = isKey ? 'rgba(255, 248, 225, 0.62)' : 'rgba(255, 179, 71, 0.18)';
  ctx.lineWidth = isKey ? S * 0.0024 : S * 0.0012;
  ctx.beginPath();
  ctx.moveTo(p0.x, p0.y);
  ctx.lineTo(p1.x, p1.y);
  ctx.lineTo(p2.x, p2.y);
  ctx.lineTo(p3.x, p3.y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  if (isKey) {
    ctx.globalCompositeOperation = 'screen';
    drawGlow(lit.x, lit.y, S * 0.065, AMBER_BRIGHT, 0.30);
  }
  ctx.restore();
}

function drawStoneConnectors(cx, cy, innerR, outerR) {
  const count = 15;
  const start = Math.PI * 1.02;
  const end = Math.PI * 1.98;
  const step = (end - start) / count;
  const center = Math.floor(count / 2);
  const slabCy = cy + S * 0.02;

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.lineCap = 'round';
  for (let i = 0; i < count; i++) {
    const mid = start + (i + 0.5) * step;
    const from = polar(cx, cy, innerR * 0.96, mid);
    const spread = (i - center) / center;
    const to = {
      x: cx + spread * innerR * 0.30,
      y: slabCy - innerR * 0.34 + Math.abs(spread) * innerR * 0.26,
    };
    const c1 = polar(cx, cy, outerR * 0.36, mid);
    const c2 = {
      x: cx + spread * innerR * 0.22,
      y: slabCy - innerR * 0.16 + Math.abs(spread) * innerR * 0.14,
    };
    const grad = ctx.createLinearGradient(from.x, from.y, to.x, to.y);
    grad.addColorStop(0, 'rgba(255, 179, 71, 0.13)');
    grad.addColorStop(0.64, 'rgba(255, 179, 71, 0.055)');
    grad.addColorStop(1, 'rgba(255, 179, 71, 0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = i === center ? S * 0.0017 : S * 0.0010;
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.bezierCurveTo(c1.x, c1.y, c2.x, c2.y, to.x, to.y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawRosettaStone(cx, cy, r) {
  const w = r * 1.02;
  const h = r * 1.54;
  const x = cx - w / 2;
  const y = cy - h * 0.48;
  const pts = [
    [x + w * 0.18, y + h * 0.07],
    [x + w * 0.34, y],
    [x + w * 0.70, y + h * 0.02],
    [x + w * 0.86, y + h * 0.11],
    [x + w * 0.93, y + h * 0.90],
    [x + w * 0.76, y + h],
    [x + w * 0.20, y + h * 0.96],
    [x + w * 0.08, y + h * 0.78],
  ];

  const grad = ctx.createLinearGradient(x, y, x + w, y + h);
  grad.addColorStop(0, '#17111b');
  grad.addColorStop(0.40, '#2b2027');
  grad.addColorStop(0.72, '#120e18');
  grad.addColorStop(1, '#08050c');

  ctx.save();
  ctx.shadowColor = 'rgba(0, 0, 0, 0.72)';
  ctx.shadowBlur = S * 0.022;
  ctx.fillStyle = grad;
  ctx.strokeStyle = 'rgba(255, 179, 71, 0.18)';
  ctx.lineWidth = S * 0.0015;
  drawClosedPath(pts);
  ctx.fill();
  ctx.stroke();

  ctx.save();
  drawClosedPath(pts);
  ctx.clip();
  drawStoneTexture(x, y, w, h);
  drawEngravingBands(x, y, w, h);
  ctx.restore();

  ctx.restore();
}

function drawStoneTexture(x, y, w, h) {
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (let i = 0; i < 70; i++) {
    const px = rand(x + w * 0.08, x + w * 0.92);
    const py = rand(y + h * 0.08, y + h * 0.94);
    const a = rand(0.025, 0.075);
    ctx.fillStyle = `rgba(255, 248, 225, ${a})`;
    ctx.beginPath();
    ctx.arc(px, py, rand(S * 0.0009, S * 0.0024), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawEngravingBands(x, y, w, h) {
  const bands = [
    { y: y + h * 0.20, lines: 5, width: 0.58 },
    { y: y + h * 0.43, lines: 7, width: 0.74 },
    { y: y + h * 0.70, lines: 8, width: 0.68 },
  ];

  ctx.save();
  ctx.lineCap = 'round';
  for (const band of bands) {
    for (let i = 0; i < band.lines; i++) {
      const yy = band.y + i * h * 0.026;
      const start = x + w * rand(0.18, 0.28);
      const end = x + w * (band.width + rand(0.08, 0.18));
      ctx.strokeStyle = `rgba(255, 179, 71, ${rand(0.10, 0.18)})`;
      ctx.lineWidth = S * rand(0.0010, 0.0018);
      ctx.beginPath();
      ctx.moveTo(start, yy);
      ctx.lineTo(end, yy + rand(-S * 0.002, S * 0.002));
      ctx.stroke();

      for (let g = 0; g < 4; g++) {
        const gx = start + (end - start) * rand(0.10, 0.92);
        ctx.strokeStyle = `rgba(255, 248, 225, ${rand(0.08, 0.16)})`;
        ctx.lineWidth = S * 0.0011;
        ctx.beginPath();
        ctx.moveTo(gx, yy - S * 0.004);
        ctx.lineTo(gx + rand(-S * 0.004, S * 0.004), yy + S * 0.005);
        ctx.stroke();
      }
    }
  }
  ctx.restore();
}

function drawCenterKeystone(cx, cy, innerR) {
  const topY = cy - innerR * 0.38;
  const midY = cy + innerR * 0.08;
  const bottomY = cy + innerR * 0.54;
  const topW = innerR * 0.54;
  const midW = innerR * 0.35;
  const bottomW = innerR * 0.22;

  const outer = [
    [cx - topW * 0.50, topY],
    [cx + topW * 0.50, topY],
    [cx + midW * 0.50, midY],
    [cx + bottomW * 0.50, bottomY],
    [cx - bottomW * 0.50, bottomY],
    [cx - midW * 0.50, midY],
  ];

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  drawGlow(cx, cy + innerR * 0.06, innerR * 0.56, AMBER, 0.20);
  ctx.restore();

  const grad = ctx.createLinearGradient(cx - topW, topY, cx + topW, bottomY);
  grad.addColorStop(0, 'rgba(156, 45, 0, 0.92)');
  grad.addColorStop(0.26, 'rgba(255, 90, 0, 0.90)');
  grad.addColorStop(0.63, 'rgba(255, 179, 71, 0.86)');
  grad.addColorStop(1, 'rgba(230, 138, 0, 0.90)');

  ctx.save();
  ctx.shadowColor = 'rgba(255, 90, 0, 0.58)';
  ctx.shadowBlur = S * 0.025;
  ctx.fillStyle = grad;
  ctx.strokeStyle = 'rgba(255, 248, 225, 0.68)';
  ctx.lineWidth = S * 0.0026;
  drawClosedPath(outer);
  ctx.fill();
  ctx.stroke();

  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = 'rgba(255, 248, 225, 0.12)';
  drawClosedPath([
    [cx - topW * 0.10, topY + innerR * 0.05],
    [cx + topW * 0.30, topY + innerR * 0.05],
    [cx + midW * 0.20, midY],
    [cx + bottomW * 0.07, bottomY - innerR * 0.10],
    [cx - bottomW * 0.03, bottomY - innerR * 0.14],
    [cx - midW * 0.08, midY],
  ]);
  ctx.fill();

  ctx.strokeStyle = 'rgba(83, 23, 0, 0.46)';
  ctx.lineWidth = S * 0.0019;
  ctx.beginPath();
  ctx.moveTo(cx, topY + innerR * 0.08);
  ctx.lineTo(cx - innerR * 0.04, bottomY - innerR * 0.08);
  ctx.stroke();

  ctx.strokeStyle = 'rgba(255, 248, 225, 0.24)';
  ctx.lineWidth = S * 0.0014;
  ctx.beginPath();
  ctx.moveTo(cx - topW * 0.37, topY + innerR * 0.11);
  ctx.lineTo(cx - midW * 0.28, midY);
  ctx.lineTo(cx - bottomW * 0.18, bottomY - innerR * 0.08);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + topW * 0.37, topY + innerR * 0.11);
  ctx.lineTo(cx + midW * 0.28, midY);
  ctx.lineTo(cx + bottomW * 0.18, bottomY - innerR * 0.08);
  ctx.stroke();
  ctx.restore();
}

function drawText() {
  const padX = W * 0.085;
  const baseY = H * 0.175;
  const titleSize = Math.round(H * 0.086);

  ctx.save();
  ctx.fillStyle = CREAM;
  ctx.shadowColor = 'rgba(0, 0, 0, 0.72)';
  ctx.shadowBlur = Math.round(H * 0.016);
  ctx.textBaseline = 'top';
  ctx.font = `800 ${titleSize}px -apple-system, "Segoe UI", system-ui, sans-serif`;
  ctx.fillText('Bazarr', padX, baseY);

  const baseW = ctx.measureText('Bazarr').width;
  const plusSize = Math.round(titleSize * 0.72);
  ctx.font = `900 ${plusSize}px -apple-system, "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = AMBER;
  ctx.fillText('+', padX + baseW + Math.round(titleSize * 0.035), baseY - Math.round(titleSize * 0.045));
  ctx.restore();

  ctx.save();
  ctx.shadowColor = 'rgba(0, 0, 0, 0.74)';
  ctx.shadowBlur = Math.round(H * 0.014);
  ctx.textBaseline = 'top';
  const subSize = Math.round(H * 0.037);
  ctx.font = `500 ${subSize}px -apple-system, "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(255, 248, 225, 0.94)';
  const subY = baseY + Math.round(H * 0.115);
  ctx.fillText('V2.3.1 Released', padX, subY);

  const codeY = subY + Math.round(subSize * 1.48);
  ctx.fillStyle = 'rgba(255, 248, 225, 0.94)';
  ctx.fillText('Codename: ', padX, codeY);
  const cwidth = ctx.measureText('Codename: ').width;
  ctx.fillStyle = AMBER;
  ctx.font = `700 ${subSize}px -apple-system, "Segoe UI", system-ui, sans-serif`;
  ctx.fillText('Keystone', padX + cwidth, codeY);
  ctx.restore();
}

function drawFilmGrain() {
  const tileSize = 256;
  const tile = document.createElement('canvas');
  tile.width = tileSize;
  tile.height = tileSize;
  const tctx = tile.getContext('2d');
  const image = tctx.createImageData(tileSize, tileSize);
  for (let y = 0; y < tileSize; y++) {
    for (let x = 0; x < tileSize; x++) {
      const v = Math.floor(rand(0, 255));
      const i = (y * tileSize + x) * 4;
      image.data[i] = v;
      image.data[i + 1] = v;
      image.data[i + 2] = v;
      image.data[i + 3] = 255;
    }
  }
  tctx.putImageData(image, 0, 0);

  ctx.save();
  ctx.globalAlpha = 0.044;
  ctx.globalCompositeOperation = 'overlay';
  ctx.fillStyle = ctx.createPattern(tile, 'repeat');
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

function fillRadial(x, y, r, stops) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
  for (const [color, stop] of stops) {
    grad.addColorStop(stop, color);
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawGlow(x, y, r, hex, alpha) {
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, rgba(hex, alpha));
  grad.addColorStop(1, rgba(hex, 0));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function polar(cx, cy, r, a) {
  return { x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r };
}

function drawClosedPath(points) {
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i][0], points[i][1]);
  }
  ctx.closePath();
}

function rgba(hex, alpha) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function rand(min, max) {
  return min + rng() * (max - min);
}

function mulberry32(seed) {
  return function next() {
    let t = seed += 0x6d2b79f5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
</script>
